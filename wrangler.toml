name = "openrouter-workers-proxy"
main = "src/index.ts"
compatibility_date = "2026-07-05"
assets = { directory = "./public", binding = "ASSETS" }

# D1 绑定：在 Cloudflare Dashboard → Worker Settings → D1 中绑定
[[d1_databases]]
binding = "DB"
database_name = "openrouter_proxy"

# KV 绑定：在 Cloudflare Dashboard → Worker Settings → KV 中绑定
[[kv_namespaces]]
binding = "CACHE"

[vars]
SESSION_COOKIE_NAME = "wb_admin_session"
CSRF_COOKIE_NAME = "wb_admin_csrf"
UPSTREAM_BASE_URL = "https://openrouter.ai/api"
ADMIN_SESSION_TTL_SECONDS = "28800"
DEFAULT_TOKEN_RPM = "60"
DEFAULT_TOKEN_DAILY_LIMIT = "10000"
